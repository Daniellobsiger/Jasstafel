<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Jass Scorecard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      margin-bottom: 10px;
      font-size: 48px;
    }

    p {
      color: #aaa;
      margin-bottom: 40px;
      font-size: 22px;
    }

    button {
      width: 90%;
      max-width: 420px;
      padding: 22px;
      margin: 12px auto;
      display: block;
      font-size: 28px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: white;
      color: black;
    }

    .secondary {
      background: #2a2a2a;
      color: white;
    }
  </style>
</head>
<body>
  <h1>JASS</h1>
  <p>Spielmodus wählen</p>

  <button class="primary">Coiffeur</button>
  <button class="secondary">Schieber</button>
</body>
</html>
